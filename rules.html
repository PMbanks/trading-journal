<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://unpkg.com/lucide@latest"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configure Trading Rules</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
.sidebar{
position:fixed;
left:0;
top:0;

width:230px;
height:100%;

background:var(--bg-card);

border-right:1px solid var(--border-color);

padding:24px 18px;

display:flex;
flex-direction:column;

z-index:100;

backdrop-filter:blur(12px);
}
.sidebar-divider{
height:1px;

width:100%;

background:var(--border-color);

margin-bottom:14px;

opacity:.8;
}
.sidebar-link{
padding:14px 18px;

border-radius:14px;

margin-bottom:8px;

text-decoration:none;

color:var(--text-secondary);

font-size:15px;
font-weight:600;

transition:.25s;
}

.sidebar-link:hover{
background:rgba(255,255,255,.04);

color:var(--text-primary);
}
.sidebar-link.active{
background:linear-gradient(
135deg,
var(--accent-main),
var(--accent-soft)
);

color:white;

box-shadow:0 0 20px rgba(102,126,234,.25);
}
.sidebar-logo{
text-decoration:none;

color:#fff;

font-size:1.3rem;
font-weight:800;

padding:14px 18px;

border-radius:18px;

background:linear-gradient(
135deg,
var(--accent-soft),
var(--bg-secondary)
);

text-align:center;

margin-bottom:24px;
}
:root{
    --bg-primary:#0d1117;
    --bg-secondary:#111827;

    --bg-card:rgba(20,25,35,.72);

    --text-primary:#ffffff;
    --text-secondary:#8b949e;

    --border-color:rgba(255,255,255,.08);

    --accent-main:#667eea;
    --accent-soft:#764ba2;

    --accent-green:#22c55e;
    --accent-red:#ef4444;
    --accent-warn:#f59e0b;
}

.theme-black{
    --bg-primary:#0d1117;
    --bg-secondary:#111827;
    --bg-card:rgba(20,25,35,.72);

    --accent-main:#667eea;
    --accent-soft:#764ba2;
}

.theme-darkblue{
    --bg-primary:#071120;
    --bg-secondary:#0f1c2e;
    --bg-card:rgba(10,20,35,.88);

    --accent-main:#3b82f6;
    --accent-soft:#2563eb;
}

.theme-purple{
    --bg-primary:#14071f;
    --bg-secondary:#221033;
    --bg-card:rgba(30,15,50,.88);

    --accent-main:#8b5cf6;
    --accent-soft:#6d28d9;
}

.theme-darkred{
    --bg-primary:#090303;
    --bg-secondary:#140707;
    --bg-card:rgba(20,8,8,.92);

    --accent-main:#8b5a5a;
    --accent-soft:#5b1d1d;
}

.theme-darkbrown{
    --bg-primary:#1a120d;
    --bg-secondary:#241812;
    --bg-card:rgba(35,25,18,.92);

    --accent-main:#9a735a;
    --accent-soft:#5c4033;
}

.theme-white{
    --bg-primary:#f3f4f6;
    --bg-secondary:#ffffff;
    --bg-card:rgba(255,255,255,.85);

    --text-primary:#111827;
    --text-secondary:#6b7280;

    --border-color:rgba(0,0,0,.08);

    --accent-main:#3b82f6;
    --accent-soft:#2563eb;
}
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding:40px;
padding-left:240px;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
        }
body::before{
content:'';
position:fixed;
inset:0;

background:
radial-gradient(circle at top left,
rgba(255,255,255,.05),
transparent 30%),

radial-gradient(circle at bottom right,
rgba(255,255,255,.03),
transparent 35%);

pointer-events:none;
z-index:0;
}
.main-content{
width:100%;
max-width:980px;

margin:0 auto;

position:relative;
z-index:1;

opacity:0;

animation:fadeInUp .6s ease forwards;
}
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
.header{
margin-bottom:34px;
text-align:center;
}

.header h1{
font-size:58px;

font-weight:800;

letter-spacing:-2px;

margin-bottom:8px;

justify-content:center;
}
        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 8px;
        }
        
        .rules-box {
            background:var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 42px;
            transition: all 0.3s ease;
        }
        
        .rules-box:hover {
            border-color: var(--accent-blue);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .rule-group {
            margin-bottom: 20px;
        }
label{
display:flex;
align-items:center;
gap:8px;

margin-bottom:10px;

color:var(--text-secondary);

font-size:13px;

font-weight:700;

letter-spacing:1px;

text-transform:uppercase;
}
select{
width:100%;

padding:14px 16px;

background:rgba(255,255,255,.03);

border:1px solid var(--border-color);

color:var(--text-primary);

border-radius:16px;

font-size:15px;

font-family:inherit;

cursor:pointer;

transition:.25s;

appearance:none;
-webkit-appearance:none;
-moz-appearance:none;
}

select option{
background:#111827;
color:white;
}
        select:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px rgba(33, 150, 243, 0.1);
        }
        
        select:hover {
            border-color: var(--accent-blue);
        }
 .save-btn{
background:linear-gradient(
135deg,
var(--accent-main),
var(--accent-soft)
);

color:white;

padding:14px 24px;

border:none;

border-radius:16px;

cursor:pointer;

width:100%;

margin-top:20px;

font-weight:700;

font-size:1rem;

transition:.25s;

display:flex;
align-items:center;
justify-content:center;
gap:8px;
}

.save-btn:hover{
transform:translateY(-2px);

box-shadow:0 0 25px rgba(102,126,234,.35);
}
        .note {
            margin-top: 16px;
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-align: center;
            line-height: 1.5;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
        }
        .theme-modal.active {
            display: flex;
        }
        
        .theme-modal-content {
            background: var(--bg-secondary);
            padding: 35px;
            border-radius: 28px;
            border: 1px solid var(--border-color);
            text-align: center;
            max-width: 450px;
            width: 90%;
            animation: modalSlide 0.3s ease;
        }
        
        @keyframes modalSlide {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .theme-modal-content h3 {
            margin-bottom: 25px;
            font-size: 1.4rem;
            font-weight: 700;
        }
        
        .theme-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .theme-option {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.2s;
            margin: 0 auto;
        }
        
        .theme-option:hover {
            transform: scale(1.05);
            border-color: var(--accent-blue);
        }
        @media (max-width: 768px) {
            body {
                padding: 20px !important;
            }
            .sidebar {
                display: none;
            }
            .header-controls {
                position: relative;
                top: auto;
                right: auto;
                justify-content: center;
                margin-bottom: 20px;
            }
            .main-content {
                padding-top: 0;
            }
            .theme-options {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
<div class="sidebar">
<a href="index.html"
class="sidebar-logo">
Dashboard
</a>
<div class="sidebar-divider"></div>

<a href="trading.html"
class="sidebar-link">
Trading Hub
</a>
<a href="calendar.html"
class="sidebar-link">
Calendar
</a>

<a href="journal.html"
class="sidebar-link">
Journal
</a>

<a href="propfirms.html"
class="sidebar-link">
Prop Firms
</a>

<a href="analytics.html"
class="sidebar-link">
Analytics
</a>

<a href="payouts.html"
class="sidebar-link">
Payouts
</a>
<a href="rules.html"
class="sidebar-link active">
Rules
</a>
</div>
    <div class="main-content">
        <div class="header">
            <h1>Trading Rules</h1>
            <div class="subtitle">Configure your discipline parameters</div>
        </div>
        
        <div class="rules-box">
            <div class="rule-group">
                <label>📊 Max Trades Per Day</label>
                <select id="maxTrades">
                    <option>None (Disabled)</option>
                    <option>1 Trade</option>
                    <option>2 Trades</option>
                    <option>3 Trades</option>
                    <option>4 Trades</option>
                    <option>5 Trades</option>
                </select>
            </div>
            
            <div class="rule-group">
                <label>⏱️ Revenge Trading Cooldown</label>
                <select id="cooldown">
                    <option>None (Disabled)</option>
                    <option>3 Minutes</option>
                    <option>5 Minutes</option>
                    <option>10 Minutes</option>
                    <option>15 Minutes</option>
                    <option>30 Minutes</option>
                </select>
            </div>
            
            <div class="rule-group">
                <label>⚠️ Max Risk Per Trade</label>
                <select id="maxRisk">
                    <option>None (Disabled)</option>
                    <option>0.25%</option>
                    <option>0.50%</option>
                    <option>0.75%</option>
                    <option>1.00%</option>
                </select>
            </div>
            
            <div class="rule-group">
                <label>📉 Max Daily Drawdown</label>
                <select id="maxDrawdown">
                    <option>None (Disabled)</option>
                    <option>1%</option>
                    <option>2%</option>
                    <option>3%</option>
                </select>
            </div>
            
            <button class="save-btn" id="saveBtn">💾 Save Rules</button>
            <p class="note">Select "None" to disable a specific rule. Rules apply across all trading sessions and will help maintain discipline.</p>
        </div>
    </div>
    <script>
const savedTheme =
localStorage.getItem('theme') || 'theme-black';

document.body.className = savedTheme;
        const rules = JSON.parse(localStorage.getItem('rules')) || {};
        if (rules.maxTrades) document.getElementById('maxTrades').value = rules.maxTrades;
        if (rules.cooldown) document.getElementById('cooldown').value = rules.cooldown;
        if (rules.maxRisk) document.getElementById('maxRisk').value = rules.maxRisk;
        if (rules.maxDrawdown) document.getElementById('maxDrawdown').value = rules.maxDrawdown;

        // Save rules button logic
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.addEventListener('click', () => {
            const newRules = {
                maxTrades: document.getElementById('maxTrades').value,
                cooldown: document.getElementById('cooldown').value,
                maxRisk: document.getElementById('maxRisk').value,
                maxDrawdown: document.getElementById('maxDrawdown').value
            };
            localStorage.setItem('rules', JSON.stringify(newRules));
const originalText = saveBtn.innerHTML;

saveBtn.innerHTML = 'Saved';

saveBtn.style.opacity = '.85';

setTimeout(() => {

    saveBtn.innerHTML = originalText;

    saveBtn.style.opacity = '1';

},1500);
        });
    </script>
</body>
</html>
