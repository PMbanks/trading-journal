<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Dashboard</title>
    <style>
        :root {
            --bg-primary: #0d0d0d;
            --bg-secondary: #1a1a1a;
            --bg-card: linear-gradient(145deg, #1a1a1a, #1e1e1e);
            --text-primary: #e0e0e0;
            --text-secondary: #888;
            --border-color: #333;
        }

        .theme-white {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f8f8;
            --bg-card: linear-gradient(145deg, #ffffff, #f0f0f0);
            --text-primary: #1a1a1a;
            --text-secondary: #555;
            --border-color: #ddd;
        }

        .theme-darkblue {
            --bg-primary: #0a1929;
            --bg-secondary: #132f4c;
            --bg-card: linear-gradient(145deg, #132f4c, #1a3a5c);
            --text-primary: #e0e0e0;
            --text-secondary: #8ab4d8;
            --border-color: #1e3a5f;
        }

        .theme-black {
            --bg-primary: #0d0d0d;
            --bg-secondary: #1a1a1a;
            --bg-card: linear-gradient(145deg, #1a1a1a, #1e1e1e);
            --text-primary: #e0e0e0;
            --text-secondary: #888;
            --border-color: #333;
        }

        .theme-purple {
            --bg-primary: #1a0a2e;
            --bg-secondary: #2d1b4e;
            --bg-card: linear-gradient(145deg, #2d1b4e, #3d2b5e);
            --text-primary: #e8d5f5;
            --text-secondary: #b794d4;
            --border-color: #4a2c7a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            padding-top: 100px;
            transition: all 0.3s ease;
        }

        .news-alert {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(90deg, #c62828, #b71c1c);
            color: #fff;
            padding: 10px 0;
            z-index: 100;
            overflow: hidden;
        }

        .news-alert-content {
            display: flex;
            animation: scroll 30s linear infinite;
            white-space: nowrap;
        }

        .news-alert-content:hover {
            animation-play-state: paused;
        }

        .news-item-alert {
            display: inline-flex;
            align-items: center;
            padding: 0 40px;
            gap: 8px;
        }

        .news-item-alert .date {
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .news-item-alert .title {
            font-weight: 500;
        }

        .no-news-alert {
            padding: 10px;
            text-align: center;
            font-size: 0.9rem;
        }

        @keyframes scroll {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 40px;
            background: linear-gradient(135deg, #2196f3, #00c853);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .menu-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 30px 40px;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 25px;
            width: 100%;
            max-width: 500px;
            position: relative;
            overflow: hidden;
        }

        .menu-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #2196f3, #1976d2);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .menu-card:hover::before { opacity: 1; }
        .menu-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(33, 150, 243, 0.15);
        }

        .menu-card.calendar::before { background: linear-gradient(90deg, #00c853, #009624); }
        .menu-card.calendar:hover { box-shadow: 0 15px 40px rgba(0, 200, 83, 0.15); }
        .menu-card.propfirms::before { background: linear-gradient(90deg, #9c27b0, #7b1fa2); }
        .menu-card.propfirms:hover { box-shadow: 0 15px 40px rgba(156, 39, 176, 0.15); }

        .menu-card .icon {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            flex-shrink: 0;
            font-size: 1.8rem;
        }

        .menu-card .content { text-align: left; }

        .menu-card h2 {
            font-size: 1.3rem;
            margin-bottom: 6px;
            color: var(--text-primary);
        }

        .menu-card p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .menu-card.small { padding: 20px 30px; max-width: 400px; }
        .menu-card.small .icon { width: 50px; height: 50px; font-size: 1.5rem; }
        .menu-card.small h2 { font-size: 1.1rem; }
        .menu-card.small p { font-size: 0.85rem; }

        .menu-card.large { max-width: 550px; padding: 35px 45px; }
        .menu-card.large .icon { width: 70px; height: 70px; font-size: 2rem; }
        .menu-card.large h2 { font-size: 1.4rem; }

        .theme-selector {
            position: fixed;
            top: 60px;
            right: 20px;
            display: flex;
            gap: 8px;
            background: var(--bg-secondary);
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            z-index: 101;
        }

        .theme-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
        }

        .theme-btn:hover { transform: scale(1.1); }
        .theme-btn.active { border-color: #2196f3; }
        .theme-btn.white { background: #ffffff; border-color: #ccc; }
        .theme-btn.darkblue { background: #0a1929; }
        .theme-btn.black { background: #0d0d0d; border-color: #444; }
        .theme-btn.purple { background: #6a0dad; }

        .footer {
            margin-top: 40px;
            text-align: right;
            width: 100%;
            max-width: 800px;
        }

        .footer p {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; margin-bottom: 30px; }
            .menu-card { padding: 20px 25px; gap: 15px; }
            .menu-card .icon { width: 50px; height: 50px; font-size: 1.5rem; }
            .menu-card h2 { font-size: 1.1rem; }
            .menu-card p { font-size: 0.85rem; }
            .menu-card.small { max-width: 100%; }
            .menu-card.large { max-width: 100%; padding: 25px 30px; }
            .theme-selector { top: 55px; right: 10px; padding: 6px 10px; gap: 6px; }
            .theme-btn { width: 24px; height: 24px; }
            body { padding-top: 90px; }
        }
    </style>
</head>
<body class="theme-black">
    <div class="news-alert" id="newsAlert">
        <div class="news-alert-content" id="newsAlertContent">
            <div class="no-news-alert">📰 No upcoming news this week</div>
        </div>
    </div>

    <div class="theme-selector">
        <button class="theme-btn white" onclick="setTheme('white')" title="White Theme"></button>
        <button class="theme-btn darkblue" onclick="setTheme('darkblue')" title="Dark Blue Theme"></button>
        <button class="theme-btn black active" onclick="setTheme('black')" title="Black Theme"></button>
        <button class="theme-btn purple" onclick="setTheme('purple')" title="Purple Theme"></button>
    </div>

    <div class="container">
        <h1>Trading Dashboard</h1>

        <div class="menu-grid">
            <a href="calendar.html" class="menu-card calendar large">
                <div class="icon" style="background: linear-gradient(135deg, #00c853, #009624);">
                    📅
                </div>
                <div class="content">
                    <h2>Calendar</h2>
                    <p>View your trading activity by date and track important events</p>
                </div>
            </a>

            <a href="journal.html" class="menu-card small">
                <div class="icon" style="background: linear-gradient(135deg, #1565c0, #0d47a1);">
                    📈
                </div>
                <div class="content">
                    <h2>Trading Journal</h2>
                    <p>Track your trades and analyze performance</p>
                </div>
            </a>

            <a href="propfirms.html" class="menu-card propfirms small">
                <div class="icon" style="background: linear-gradient(135deg, #6a0dad, #4a0080);">
                    💵
                </div>
                <div class="content">
                    <h2>Propfirms</h2>
                    <p>Manage your prop firm accounts</p>
                </div>
            </a>
        </div>

        <div class="footer">
            <p>Created by PMbanks</p>
        </div>
    </div>

    <script>
        function setTheme(theme) {
            document.body.className = 'theme-' + theme;
            localStorage.setItem('theme', theme);
            
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.classList.contains(theme)) {
                    btn.classList.add('active');
                }
            });
        }

        function loadNewsAlert() {
            const newsEvents = JSON.parse(localStorage.getItem('newsEvents')) || [];
            const today = new Date();
            const startOfWeek = new Date(today);
            startOfWeek.setDate(today.getDate() - today.getDay());
            const endOfWeek = new Date(startOfWeek);
            endOfWeek.setDate(startOfWeek.getDate() + 6);

            const weekNews = newsEvents.filter(n => {
                const newsDate = new Date(n.date);
                return newsDate >= startOfWeek && newsDate <= endOfWeek;
            }).sort((a, b) => new Date(a.date) - new Date(b.date));

            const container = document.getElementById('newsAlertContent');
            
            if (weekNews.length === 0) {
                container.innerHTML = '<div class="no-news-alert">📰 No upcoming news this week</div>';
                return;
            }

            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            let html = '';
            
            weekNews.forEach(news => {
                const newsDate = new Date(news.date);
                const dayName = days[newsDate.getDay()];
                const formattedDate = `${dayName} ${newsDate.getMonth() + 1}/${newsDate.getDate()}`;
                
                html += `
                    <div class="news-item-alert">
                        <span class="date">${formattedDate}</span>
                        <span class="title">📰 ${news.title}</span>
                        ${news.time ? `<span style="opacity:0.7">(${news.time})</span>` : ''}
                    </div>
                `;
            });

            container.innerHTML = html + html;
        }

        // Load saved theme
        const savedTheme = localStorage.getItem('theme') || 'black';
        setTheme(savedTheme);
        
        // Load news
        loadNewsAlert();
        
        // Refresh news every 30 seconds
        setInterval(loadNewsAlert, 30000);
    </script>
</body>
</html>
