<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0a; --bg-secondary: #111111; --bg-card: #1a1a1a;
            --text-primary: #ffffff; --text-secondary: #888888; --border-color: #2a2a2a;
            --accent-blue: #2196f3; --accent-green: #00c853; --accent-purple: #7c4dff;
            --accent-red: #ff5252; --accent-warn: #ff9800;
        }
        .theme-white { --bg-primary:#f5f5f5; --bg-secondary:#ffffff; --bg-card:#ffffff; --text-primary:#1a1a1a; --text-secondary:#666666; --border-color:#e0e0e0; }
        .theme-darkblue { --bg-primary:#0a1628; --bg-secondary:#142238; --bg-card:#1e3a5f; --text-primary:#e0e0e0; --text-secondary:#8ab4d8; --border-color:#2a4a7a; }
        .theme-black { --bg-primary:#0a0a0a; --bg-secondary:#111111; --bg-card:#1a1a1a; --text-primary:#ffffff; --text-secondary:#888888; --border-color:#2a2a2a; }
        .theme-purple { --bg-primary:#1a0a2e; --bg-secondary:#2d1b4e; --bg-card:#3d2b5e; --text-primary:#e8d5f5; --text-secondary:#b794d4; --border-color:#4a2c7a; }
        .theme-darkred { --bg-primary:#1a0505; --bg-secondary:#2b0a0a; --bg-card:#3d1212; --text-primary:#ffe6e6; --text-secondary:#a87b7b; --border-color:#5c1a1a; }
        .theme-darkbrown { --bg-primary:#1e120e; --bg-secondary:#331f17; --bg-card:#4a2d22; --text-primary:#e8dcd4; --text-secondary:#a89480; --border-color:#5c3a26; }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary); color: var(--text-primary); min-height: 100vh;
            padding: 20px; transition: all 0.5s ease; overflow-x: hidden; position: relative;
        }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(124, 77, 255, 0.05) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }
        .loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-primary); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        .loading-screen.hidden { opacity: 0; visibility: hidden; }
        .loader { width: 50px; height: 50px; border: 4px solid var(--border-color); border-top: 4px solid var(--accent-blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .container { max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; opacity: 0; animation: fadeIn 0.8s ease forwards; animation-delay: 0.3s; padding-top: 20px; }
        @keyframes fadeIn { to { opacity: 1; } }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; padding: 15px 0; animation: slideDown 0.6s ease; animation-delay: 0.5s; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 45px; height: 45px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
        h1 { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-blue) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .header-controls { display: flex; gap: 10px; align-items: center; }
        .theme-btn, .social-link, .reset-btn {
            background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-primary);
            padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
            transition: all 0.3s ease; display: flex; align-items: center; gap: 6px; text-decoration: none;
        }
        .theme-btn:hover, .social-link:hover, .reset-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); border-color: var(--accent-blue); }
        .reset-btn:hover { border-color: var(--accent-red); color: var(--accent-red); }
        
        /* PORTAL GRID STYLES */
        .portal-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            max-width: 900px;
            margin: 0 auto;
        }
        .portal-card {
            background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px;
            padding: 40px 30px; cursor: pointer; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden; text-decoration: none; color: inherit;
            display: flex; flex-direction: column; align-items: flex-start;
            animation: slideUp 0.6s ease; animation-fill-mode: both;
        }
        .portal-card:hover { transform: translateY(-6px); box-shadow: 0 15px 30px rgba(0,0,0,0.35); border-color: var(--accent-blue); }
        .portal-icon { 
            width: 70px; height: 70px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; 
            margin-bottom: 20px; transition: all 0.3s ease; 
        }
        .portal-card:hover .portal-icon { transform: scale(1.1) rotate(5deg); }
        .portal-card.trading .portal-icon { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .portal-card.gym .portal-icon { background: linear-gradient(135deg, #00c853 0%, #00e676 100%); }
        
        .portal-card h2 { font-size: 1.6rem; font-weight: 700; margin-bottom: 10px; color: var(--text-primary); }
        .portal-card p { color: var(--text-secondary); font-size: 1rem; line-height: 1.5; flex: 1; }
        .portal-arrow { 
            position: absolute; bottom: 30px; right: 30px; width: 40px; height: 40px; background: var(--bg-secondary); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; 
            opacity: 0; transform: translateX(-10px); transition: all 0.3s ease; 
        }
        .portal-card:hover .portal-arrow { opacity: 1; transform: translateX(0); }

        @media (max-width: 768px) {
            .portal-grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; gap: 15px; text-align: center; }
            .portal-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <div class="loading-screen" id="loadingScreen"><div class="loader"></div></div>
    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">🌐</div>
                <h1>Dashboard Portal</h1>
            </div>
            <div class="header-controls">
                <button class="theme-btn" onclick="openThemeModal()"><span>🎨</span><span>Themes</span></button>
                <button class="reset-btn" onclick="clearAllData()"><span>🗑️</span><span>Reset Data</span></button>
                <a href="https://www.instagram.com/eddwinnq/" target="_blank" class="social-link">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
                    @eddwinnq
                </a>
            </div>
        </div>

        <div class="portal-grid">
            <a href="trading.html" class="portal-card trading">
                <div class="portal-icon">📊</div>
                <h2>Trading Dashboard</h2>
                <p>Journal trades, track prop firms, monitor market sentiment & manage discipline rules</p>
                <div class="portal-arrow">→</div>
            </a>
            <a href="gym.html" class="portal-card gym">
                <div class="portal-icon">🏋️‍♂️</div>
                <h2>Gym Dashboard</h2>
                <p>Log workouts, track fasting weight history, set strength goals & monitor nutrition</p>
                <div class="portal-arrow">→</div>
            </a>
        </div>
    </div>

    <!-- Theme Modal (EXACTLY AS ORIGINAL) -->
    <div id="themeModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; justify-content:center; align-items:center;">
        <div style="background:var(--bg-secondary); padding:25px; border-radius:16px; border:1px solid var(--border-color); text-align:center;">
            <h3 style="margin-bottom:20px; font-size:1.1rem;">Select Theme</h3>
            <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:15px;">
                <div style="width:60px; height:60px; border-radius:50%; background:#0a0a0a; cursor:pointer; border:3px solid transparent;" onclick="setTheme('black')"></div>
                <div style="width:60px; height:60px; border-radius:50%; background:#f5f5f5; cursor:pointer; border:3px solid transparent;" onclick="setTheme('white')"></div>
                <div style="width:60px; height:60px; border-radius:50%; background:#0a1628; cursor:pointer; border:3px solid transparent;" onclick="setTheme('darkblue')"></div>
                <div style="width:60px; height:60px; border-radius:50%; background:#1a0a2e; cursor:pointer; border:3px solid transparent;" onclick="setTheme('purple')"></div>
                <div style="width:60px; height:60px; border-radius:50%; background:#1a0505; cursor:pointer; border:3px solid transparent;" onclick="setTheme('darkred')"></div>
                <div style="width:60px; height:60px; border-radius:50%; background:#1e120e; cursor:pointer; border:3px solid transparent;" onclick="setTheme('darkbrown')"></div>
            </div>
            <button onclick="document.getElementById('themeModal').style.display='none'" style="margin-top:20px; background:transparent; border:1px solid var(--border-color); color:var(--text-secondary); padding:8px 16px; border-radius:6px; cursor:pointer;">Close</button>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => setTimeout(() => document.getElementById('loadingScreen').classList.add('hidden'), 500));
        const savedTheme = localStorage.getItem('theme') || 'black';
        document.body.className = 'theme-' + savedTheme;
        
        function openThemeModal() { document.getElementById('themeModal').style.display = 'flex'; }
        function setTheme(theme) {
            document.body.className = 'theme-' + theme;
            localStorage.setItem('theme', theme);
            document.getElementById('themeModal').style.display = 'none';
        }
        
        // Reset All Data (Double Confirmation)
        function clearAllData() {
            if(confirm('⚠️ This will delete ALL trading & gym data, rules, notes, and settings. Are you absolutely sure?')) {
                if(confirm('⚠️ FINAL WARNING: This action cannot be undone. All localStorage data will be permanently erased. Continue?')) {
                    localStorage.clear();
                    location.reload();
                }
            }
        }
    </script>
</body>
</html>
