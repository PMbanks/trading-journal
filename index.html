<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Dashboard</title>
    <style>
        :root {
            --bg-primary: #0d0d0d;
            --bg-secondary: #1a1a1a;
            --bg-card: #1e1e1e;
            --text-primary: #e0e0e0;
            --text-secondary: #888;
            --border-color: #333;
        }

        .theme-white {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #666;
            --border-color: #ddd;
        }

        .theme-darkblue {
            --bg-primary: #0a1929;
            --bg-secondary: #132f4c;
            --bg-card: #1a3a5c;
            --text-primary: #e0e0e0;
            --text-secondary: #8ab4d8;
            --border-color: #1e3a5f;
        }

        .theme-black {
            --bg-primary: #0d0d0d;
            --bg-secondary: #1a1a1a;
            --bg-card: #1e1e1e;
            --text-primary: #e0e0e0;
            --text-secondary: #888;
            --border-color: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 40px;
            background: linear-gradient(135deg, #2196f3, #00c853);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .menu-card {
            background: linear-gradient(145deg, var(--bg-secondary), var(--bg-card));
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 30px 40px;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 25px;
            width: 100%;
            max-width: 500px;
            position: relative;
            overflow: hidden;
        }

        .menu-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #2196f3, #1976d2);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .menu-card:hover::before { opacity: 1; }
        .menu-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(33, 150, 243, 0.15);
        }

        .menu-card.calendar::before { background: linear-gradient(90deg, #00c853, #009624); }
        .menu-card.calendar:hover { box-shadow: 0 15px 40px rgba(0, 200, 83, 0.15); }
        .menu-card.propfirms::before { background: linear-gradient(90deg, #9c27b0, #7b1fa2); }
        .menu-card.propfirms:hover { box-shadow: 0 15px 40px rgba(156, 39, 176, 0.15); }

        .menu-card .icon {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            flex-shrink: 0;
        }

        .menu-card .icon svg { width: 30px; height: 30px; }

        .menu-card .content { text-align: left; }

        .menu-card h2 {
            font-size: 1.3rem;
            margin-bottom: 6px;
            color: var(--text-primary);
        }

        .menu-card p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .menu-card.small { padding: 20px 30px; max-width: 400px; }
        .menu-card.small .icon { width: 50px; height: 50px; }
        .menu-card.small .icon svg { width: 25px; height: 25px; }
        .menu-card.small h2 { font-size: 1.1rem; }
        .menu-card.small p { font-size: 0.85rem; }

        .menu-card.large { max-width: 550px; padding: 35px 45px; }
        .menu-card.large .icon { width: 70px; height: 70px; }
        .menu-card.large .icon svg { width: 35px; height: 35px; }
        .menu-card.large h2 { font-size: 1.4rem; }

        .theme-selector {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            background: var(--bg-secondary);
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        .theme-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
        }

        .theme-btn:hover { transform: scale(1.1); }
        .theme-btn.active { border-color: #2196f3; }
        .theme-btn.white { background: #ffffff; border-color: #ccc; }
        .theme-btn.darkblue { background: #0a1929; }
        .theme-btn.black { background: #0d0d0d; border-color: #333; }

        .footer {
            margin-top: 40px;
            text-align: right;
            width: 100%;
            max-width: 800px;
        }

        .footer p {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; margin-bottom: 30px; }
            .menu-card { padding: 20px 25px; gap: 15px; }
            .menu-card .icon { width: 50px; height: 50px; }
            .menu-card .icon svg { width: 25px; height: 25px; }
            .menu-card h2 { font-size: 1.1rem; }
            .menu-card p { font-size: 0.85rem; }
            .menu-card.small { max-width: 100%; }
            .menu-card.large { max-width: 100%; padding: 25px 30px; }
            .theme-selector { top: 10px; right: 10px; padding: 6px 10px; }
        }
    </style>
</head>
<body class="theme-black">
    <div class="theme-selector">
        <button class="theme-btn white" onclick="setTheme('white')" title="White Theme"></button>
        <button class="theme-btn darkblue" onclick="setTheme('darkblue')" title="Dark Blue Theme"></button>
        <button class="theme-btn black active" onclick="setTheme('black')" title="Black Theme"></button>
    </div>

    <div class="container">
        <h1>Trading Dashboard</h1>

        <div class="menu-grid">
            <a href="calendar.html" class="menu-card calendar large">
                <div class="icon" style="background: linear-gradient(135deg, #009624, #006400);">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                        <line x1="9" y1="2" x2="9" y2="6"/>
                        <line x1="15" y1="2" x2="15" y2="6"/>
                        <circle cx="8" cy="15" r="1" fill="#2196f3"/>
                        <circle cx="12" cy="15" r="1" fill="#2196f3"/>
                        <circle cx="16" cy="15" r="1" fill="#2196f3"/>
                    </svg>
                </div>
                <div class="content">
                    <h2>Calendar</h2>
                    <p>View your trading activity by date and track important events</p>
                </div>
            </a>

            <a href="journal.html" class="menu-card small">
                <div class="icon" style="background: linear-gradient(135deg, #1565c0, #0d47a1);">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
                        <path d="M3 3v18h18"/>
                        <path d="M7 16l4-4 4 4 5-6"/>
                        <circle cx="20" cy="8" r="2" fill="#00c853"/>
                    </svg>
                </div>
                <div class="content">
                    <h2>Trading Journal</h2>
                    <p>Track your trades and analyze performance</p>
                </div>
            </a>

            <a href="propfirms.html" class="menu-card propfirms small">
                <div class="icon" style="background: linear-gradient(135deg, #9c27b0, #7b1fa2);">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <line x1="3" y1="9" x2="21" y2="9"/>
                        <line x1="9" y1="21" x2="9" y2="9"/>
                        <text x="12" y="16" fill="#fff" font-size="6" text-anchor="middle">$</text>
                    </svg>
                </div>
                <div class="content">
                    <h2>Propfirms</h2>
                    <p>Manage your prop firm accounts</p>
                </div>
            </a>
        </div>

        <div class="footer">
            <p>Created by PMbanks</p>
        </div>
    </div>

    <script>
        function setTheme(theme) {
            document.body.className = 'theme-' + theme;
            localStorage.setItem('theme', theme);
            
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.classList.contains(theme)) {
                    btn.classList.add('active');
                }
            });
        }

        // Load saved theme
        const savedTheme = localStorage.getItem('theme') || 'black';
        setTheme(savedTheme);
    </script>
</body>
</html>
